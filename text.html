<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universal Roblox Mesh Viewer - PRO</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #ui { position: fixed; top: 0; width: 100%; background: rgba(15,15,15,0.95); padding: 15px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; border-bottom: 2px solid #00a8ff; backdrop-filter: blur(5px); }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #00a8ff; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #222; color: #00a8ff; border: 1px solid #00a8ff; padding: 10px; border-radius: 6px; box-sizing: border-box; cursor: pointer; }
        input::file-selector-button { background: #00a8ff; color: #111; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        #status { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 13px; font-weight: bold; color: #bbb; pointer-events: none; text-shadow: 1px 1px 3px black; background: rgba(0,0,0,0.6); padding: 8px 0; transition: color 0.3s; }
        #info { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
        #loading-bar-container { display: none; width: 80%; height: 4px; background: #333; margin: 10px auto 0 auto; border-radius: 2px; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #00a8ff; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Visualizador de Mesh PRO</h3>
        <input type="file" id="file" accept=".mesh">
        <div id="info">Processamento em Segundo Plano (Suporta 100MB+)</div>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
    </div>
    <div id="status">Aguardando arquivo...</div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. CONFIGURAÇÃO DO AMBIENTE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x151515);
        // Adiciona uma grade no chão para melhor percepção de espaço
        const gridHelper = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
        gridHelper.position.y = -5;
        scene.add(gridHelper);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // --- 2. ILUMINAÇÃO ESTILO ESTÚDIO ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.0); // Luz principal
        keyLight.position.set(50, 100, 50);
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0x90b0d0, 0.6); // Luz de preenchimento (fria)
        fillLight.position.set(-50, 20, 50);
        scene.add(fillLight);
        const backLight = new THREE.DirectionalLight(0xffddaa, 0.5); // Contra-luz (quente)
        backLight.position.set(0, 50, -100);
        scene.add(backLight);

        // --- 3. CÓDIGO DO WEB WORKER (Lê arquivos sem travar a tela) ---
        const workerCode = `
            self.onmessage = function(e) {
                try {
                    const buffer = e.data;
                    const view = new DataView(buffer);
                    const decoder = new TextDecoder();
                    const headerText = decoder.decode(buffer.slice(0, 12));

                    if (headerText.includes("version 3") || headerText.includes("version 4") || headerText.includes("version 5")) {
                        throw new Error("Versões 3, 4 e 5 usam compressão LZ4. Não suportado no navegador sem descompressão.");
                    }
                    
                    else if (headerText.includes("version 2.00")) {
                        const headerSize = view.getUint16(13, true); 
                        const vertexSize = view.getUint8(15);        
                        const faceSize = view.getUint8(16);          
                        const numVerts = view.getUint32(17, true);   
                        const numFaces = view.getUint32(21, true);   

                        self.postMessage({ type: 'progress', msg: 'Processando v2.00: ' + numVerts.toLocaleString() + ' vértices...' });

                        const positions = new Float32Array(numVerts * 3);
                        const normals = new Float32Array(numVerts * 3);
                        const indices = new Uint32Array(numFaces * 3);

                        let dataOffset = 13 + headerSize;

                        for (let i = 0; i < numVerts; i++) {
                            let p = dataOffset + (i * vertexSize);
                            let idx = i * 3;
                            positions[idx] = view.getFloat32(p, true);
                            positions[idx+1] = view.getFloat32(p+4, true);
                            positions[idx+2] = view.getFloat32(p+8, true);
                            
                            normals[idx] = view.getFloat32(p+12, true);
                            normals[idx+1] = view.getFloat32(p+16, true);
                            normals[idx+2] = view.getFloat32(p+20, true);
                        }

                        dataOffset += (numVerts * vertexSize);

                        for (let i = 0; i < numFaces; i++) {
                            let f = dataOffset + (i * faceSize);
                            let idx = i * 3;
                            indices[idx] = view.getUint32(f, true);
                            indices[idx+1] = view.getUint32(f+4, true);
                            indices[idx+2] = view.getUint32(f+8, true);
                        }

                        // Transfere a memória direto para a placa de vídeo (ZERO cópias = rápido)
                        self.postMessage({ type: 'done', version: 2, positions, normals, indices }, [positions.buffer, normals.buffer, indices.buffer]);
                    } 
                    
                    else if (headerText.includes("version 1.")) {
                        self.postMessage({ type: 'progress', msg: 'Lendo formato v1.xx. Extraindo coordenadas...' });
                        const text = decoder.decode(buffer);
                        
                        // Parser otimizado para não estourar a RAM com regex.match em arquivos gigantes
                        const coords = [];
                        const regex = /-?\\d+(\\.\\d+)?(e[-+]?\\d+)?/g;
                        let match;
                        let count = 0;
                        
                        while ((match = regex.exec(text)) !== null) {
                            count++;
                            if(count > 3) { // Ignora cabeçalho
                                coords.push(parseFloat(match[0]));
                            }
                        }

                        const positions = new Float32Array(coords);
                        self.postMessage({ type: 'done', version: 1, positions }, [positions.buffer]);
                    } 
                    else {
                        throw new Error("Formato de arquivo não reconhecido.");
                    }
                } catch (err) {
                    self.postMessage({ type: 'error', msg: err.message });
                }
            };
        `;

        // Cria o Worker a partir do código acima
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        let worker;

        // --- 4. GERENCIADOR DE ARQUIVO E RENDERIZAÇÃO ---
        const status = document.getElementById('status');
        const barContainer = document.getElementById('loading-bar-container');
        const bar = document.getElementById('loading-bar');

        document.getElementById('file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            status.style.color = "#00a8ff";
            status.innerText = "Enviando para a thread de processamento...";
            barContainer.style.display = "block";
            bar.style.width = "30%";

            // Lê o arquivo como ArrayBuffer
            const buffer = await file.arrayBuffer();

            // Limpa mesh anterior
            scene.children = scene.children.filter(c => !(c instanceof THREE.Mesh));

            // Inicia o Worker
            if (worker) worker.terminate();
            worker = new Worker(URL.createObjectURL(blob));

            worker.onmessage = function(e) {
                const data = e.data;

                if (data.type === 'progress') {
                    status.innerText = data.msg;
                    bar.style.width = "60%";
                } 
                else if (data.type === 'error') {
                    status.style.color = "#ff4444";
                    status.innerText = "Erro: " + data.msg;
                    barContainer.style.display = "none";
                } 
                else if (data.type === 'done') {
                    status.innerText = "Construindo geometria 3D...";
                    bar.style.width = "90%";
                    
                    const geometry = new THREE.BufferGeometry();

                    if (data.version === 2) {
                        geometry.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
                        geometry.setAttribute('normal', new THREE.BufferAttribute(data.normals, 3));
                        geometry.setIndex(new THREE.BufferAttribute(data.indices, 1));
                    } else if (data.version === 1) {
                        geometry.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
                        geometry.computeVertexNormals();
                    }

                    // --- MATERIAL E POSICIONAMENTO ---
                    geometry.center(); // Centraliza o pivô perfeitamente
                    
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0xe0e0e0, 
                        roughness: 0.3,
                        metalness: 0.1,
                        side: THREE.DoubleSide
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.rotation.x = -Math.PI / 2; // Arruma a orientação nativa do Roblox
                    scene.add(mesh);

                    // Auto-foco inteligente e suave
                    geometry.computeBoundingBox();
                    geometry.computeBoundingSphere();
                    const radius = geometry.boundingSphere.radius;
                    
                    // Alinha o grid com a base do objeto
                    gridHelper.position.y = geometry.boundingBox.min.z; // min.z por conta da rotação X

                    camera.position.set(radius * 1.5, radius * 1.5, radius * 2);
                    camera.near = radius * 0.01;
                    camera.far = radius * 100;
                    camera.updateProjectionMatrix();
                    
                    controls.target.set(0, 0, 0);
                    controls.update();

                    status.innerText = `Sucesso! Malha carregada e otimizada.`;
                    status.style.color = "#00ff88";
                    bar.style.width = "100%";
                    setTimeout(() => { barContainer.style.display = "none"; }, 1000);
                }
            };

            // Envia o ArrayBuffer para o worker (transferência de memória ultra-rápida)
            worker.postMessage(buffer, [buffer]);
        });

        // --- 5. LOOP DE RENDERIZAÇÃO ---
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
