<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção - Mesh Engine PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050506;
            --accent: #00a8ff;
            --grid-color: rgba(0, 168, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Fundo com Grade Animada (Estilo Engine 3D) */
        .grid-background {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-20%);
            animation: moveGrid 10s linear infinite;
            z-index: 1;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(50px); }
        }

        /* Cubos Flutuantes de Fundo */
        .cube {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent);
            background: rgba(0, 168, 255, 0.05);
            animation: float 6s ease-in-out infinite;
            z-index: 2;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Conteúdo Principal */
        .content {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 12, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 450px;
        }

        .version-tag {
            background: var(--accent);
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: #a0a0a5;
            font-size: 15px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .loader {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
        }

        .loader-bar {
            width: 60%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>

    <div class="grid-background"></div>

    <div class="cube" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="cube" style="top: 70%; left: 80%; animation-delay: 2s; width: 20px; height: 20px;"></div>
    <div class="cube" style="top: 10%; left: 70%; animation-delay: 4s; border-radius: 50%;"></div>

    <div class="content">
        <div class="version-tag">System Update</div>
        
        <h1>EM MANUTENÇÃO</h1>
        
        <p class="message">
            Estamos integrando o novo <b>Modo de Edição</b> e melhorando o <b>View Model</b>. 
            A Universal Mesh Engine voltará mais potente em alguns instantes.
        </p>

        <div class="loader">
            <div class="loader-bar"></div>
        </div>

        <p style="font-size: 10px; color: #555; margin-top: 15px; letter-spacing: 1px;">
            AGUARDE A SINCRONIZAÇÃO DOS ARQUIVOS
        </p>
    </div>

</body>
</html>
