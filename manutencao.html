<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | Universal Mesh Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --accent: #00a8ff;
            --accent-glow: rgba(0, 168, 255, 0.4);
            --grid-color: rgba(0, 168, 255, 0.07);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #e0e0e5;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            perspective: 1500px;
        }

        /* Grade 3D Infinita com Fade */
        .grid-background {
            position: absolute;
            width: 300%; height: 300%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(70deg) translateY(-20%);
            animation: moveGrid 15s linear infinite;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 70%);
            z-index: 1;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(70deg) translateY(0); }
            100% { transform: rotateX(70deg) translateY(60px); }
        }

        /* Cubos com efeito Glassmorphism */
        .cube {
            position: absolute;
            border: 1px solid var(--accent-glow);
            background: rgba(0, 168, 255, 0.03);
            backdrop-filter: blur(2px);
            animation: float 8s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-40px) rotate(180deg) scale(1.1); opacity: 0.6; }
        }

        /* Painel Central */
        .content {
            position: relative;
            z-index: 10;
            background: rgba(8, 8, 10, 0.6);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 168, 255, 0.1);
            max-width: 480px;
        }

        .version-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 168, 255, 0.15);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid var(--accent-glow);
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #a0a0a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: #8b949e;
            font-size: 14px;
            line-height: 1.8;
            margin: 25px 0;
        }

        b { color: var(--accent); font-weight: 600; }

        /* Barra de Progresso Estilizada */
        .loader-container {
            margin-top: 35px;
        }

        .loader {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            animation: loading 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%) scaleX(0.5); }
            50% { transform: translateX(50%) scaleX(1.2); }
            100% { transform: translateX(200%) scaleX(0.5); }
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #444;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="grid-background"></div>

    <div class="cube" style="top: 15%; left: 15%; width: 40px; height: 40px; animation-delay: 0s;"></div>
    <div class="cube" style="top: 65%; left: 85%; width: 25px; height: 25px; animation-delay: 2s; border-radius: 4px;"></div>
    <div class="cube" style="top: 10%; left: 75%; width: 50px; height: 50px; animation-delay: 4s; opacity: 0.2;"></div>

    <div class="content">
        <div class="version-tag">Engine Kernel: Maintenance Mode</div>
        
        <h1>Site Offline</h1>
        
        <p class="message">
            O Site está em grande problemas e estará em Off-line por um tempo.

            Por enquanto não sabemos a data que o site irá retornar, espero que tenha paciência. :3

            - Mensagem de Gabriela
        </p>

        <div class="loader-container">
            <div class="loader">
                <div class="loader-bar"></div>
            </div>
            <p class="status-text">Synchronizing_Buffers_and_Meshes...</p>
        </div>
    </div>

</body>
</html>
