<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universal Mesh Engine PRO</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">
        <h3>Universal Mesh Engine</h3>
        <div class="upload-btn">
            <input type="file" id="file" accept=".mesh,.rbxm">
        </div>
    </div>

    <div id="toolbar">
        
        <div class="tool-group">
            <span class="label-small">Visualização</span>
            <button class="tool-btn" onclick="toggleWireframe()">WIREFRAME</button>
            
            <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; border: 1px solid var(--border-color);">
                <span class="label-small" style="font-size: 8px; flex-shrink: 0;">COR:</span>
                <input type="color" id="color-picker" value="#999999" oninput="changeModelColor(this.value)" 
                       style="width: 100%; height: 20px; border: none; background: none; cursor: pointer; padding: 0;">
            </div>
        </div>

        <div class="tool-group">
            <span class="label-small">Rotação (Graus)</span>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <input type="number" id="rot-val" value="90" step="1" oninput="updateRotateStep(this.value)" placeholder="90°">
                
                <div class="rotation-grid">
                    <button class="tool-btn btn-x" onclick="rotateModel('x')">ROTATE X</button>
                    <button class="tool-btn btn-y" onclick="rotateModel('y')">ROTATE Y</button>
                    <button class="tool-btn btn-z" onclick="rotateModel('z')">ROTATE Z</button>
                </div>
            </div>
        </div>

        <div class="tool-group export-group">
            <span class="label-small">Exportar</span>
            <div class="export-grid">
                <button class="tool-btn export-btn" onclick="exportModel('obj')">OBJ</button>
                <button class="tool-btn export-btn" onclick="exportModel('gltf')">GLTF</button>
            </div>
        </div>

        <div class="tool-group" style="margin-top: 5px; border-top: 1px solid var(--border-color); padding-top: 10px;">
            <span class="label-small">Info Eixos</span>
            <div style="font-size: 9px; color: var(--text-dim); display: flex; gap: 8px; font-weight: 800;">
                <span style="color: var(--axis-x)">X</span>
                <span style="color: var(--axis-y)">Y</span>
                <span style="color: var(--axis-z)">Z</span>
            </div>
        </div>
    </div>

    <div id="status-container">
        <div id="status">Aguardando Arquivo...</div>
        <div id="progress-bg">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
        } 
    }
    </script>
    
    <script type="module" src="main.js"></script>
</body>
</html>
